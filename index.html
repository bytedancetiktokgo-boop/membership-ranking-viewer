<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TikTok GO メンバーシップ見込みステータス</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root { --border:#e6e6e6; --muted:#666; --err:#b00020; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; margin: 14px; }
    h2 { margin: 0 0 14px; font-size: 22px; line-height: 1.25; }
    .card { border: 1px solid var(--border); border-radius: 14px; padding: 12px; max-width: 980px; background:#fff; }
    .row { margin: 10px 0; }
    .muted { color: var(--muted); font-size: 12px; line-height: 1.6; }
    .err { color: var(--err); white-space: pre-wrap; }

    /* responsive kv */
    .kv { display: grid; grid-template-columns: minmax(180px, 320px) 1fr; gap: 10px 14px; margin-top: 12px; align-items: start; }
    .k { font-weight: 700; color: #222; }
    .v { color:#111; }
    .v, .k { word-break: break-word; overflow-wrap: anywhere; }

    @media (max-width: 640px) {
      h2 { font-size: 20px; }
      .kv { grid-template-columns: 1fr; gap: 6px; }
      .k { margin-top: 10px; }
      .k:first-child { margin-top: 0; }
    }

    a.btn { display:inline-block; padding:10px 14px; border:1px solid var(--border); border-radius:12px; text-decoration:none; color:#111; background:#fff; }
    a.link { text-decoration: underline; }
  </style>
</head>
<body>
  <h2>TikTok GO メンバーシップ見込みステータス</h2>

  <div class="card">
    <div class="row muted" id="status">Googleでログインしてください</div>
    <div id="gbtn" class="row"></div>
    <div id="error" class="row err" style="display:none;"></div>

    <div id="content" style="display:none;">
      <div id="kv" class="row kv"></div>
    </div>

    <div id="noData" style="display:none;">
      <div class="row err" style="font-weight:700;">アカウント情報が見つかりませんでした</div>
      <div class="row muted" id="noDataMsg"></div>
      <div class="row" style="margin-top:12px;">
        <a class="btn" id="formBtn" href="#" target="_blank" rel="noopener noreferrer">登録フォームを開く</a>
      </div>
    </div>
  </div>

<script>
  const CLIENT_ID = "1047878641876-tu8l1nj5e45hjo7iavjt0i55k3ut3nve.apps.googleusercontent.com";
  const API_URL = "https://membership-ranking-proxy.bytedance-tiktokgo.workers.dev"; // Worker URL
  const FORM_URL = "https://YOUR_INTERNAL_FORM_URL"; // ★ここだけ差し替え

  function showError(msg){
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.textContent = msg;
  }
  function clearError(){
    const el = document.getElementById('error');
    el.style.display = 'none';
    el.textContent = '';
  }
  function showNoData(message){
    document.getElementById('content').style.display = 'none';
    document.getElementById('noData').style.display = 'block';
    document.getElementById('noDataMsg').textContent = message;
    document.getElementById('formBtn').href = FORM_URL;
  }
  function hideNoData(){
    document.getElementById('noData').style.display = 'none';
  }

  async function callApi(idToken){
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ id_token: idToken })
    });
    const txt = await res.text();
    try { return JSON.parse(txt); }
    catch (e) { return { ok:false, code:"NON_JSON", message:"non-json response", raw: txt }; }
  }

  // JST YYYY-MM-DD
  function formatDateJST(v) {
    if (!v) return "";
    let d;
    try { d = (v instanceof Date) ? v : new Date(v); if (isNaN(d.getTime())) return String(v); }
    catch (_) { return String(v); }
    const parts = new Intl.DateTimeFormat('en-CA', { timeZone:'Asia/Tokyo', year:'numeric', month:'2-digit', day:'2-digit' }).formatToParts(d);
    const y = parts.find(p=>p.type==='year')?.value;
    const m = parts.find(p=>p.type==='month')?.value;
    const day = parts.find(p=>p.type==='day')?.value;
    return (y && m && day) ? `${y}-${m}-${day}` : new Intl.DateTimeFormat('en-CA', { timeZone:'Asia/Tokyo' }).format(d);
  }

  function formatNumber(v){
    if (v === null || v === undefined || v === "") return "";
    const n = Number(String(v).replace(/,/g,''));
    if (isNaN(n)) return String(v);
    return new Intl.NumberFormat('en-US').format(n);
  }

  // 通貨は「値が数値ならJPYで整形」、文字列で$や¥が付いてたらそのまま
  function formatCurrencyJPY(v){
    if (v === null || v === undefined || v === "") return "";
    const s = String(v).trim();
    if (s.startsWith('$') || s.startsWith('¥') || s.startsWith('￥')) return s;
    const n = Number(s.replace(/,/g,''));
    if (isNaN(n)) return s;
    return new Intl.NumberFormat('ja-JP', { style:'currency', currency:'JPY', maximumFractionDigits:0 }).format(n);
  }

  function renderKV(config, record) {
    const kv = document.getElementById('kv');
    kv.innerHTML = '';

    for (const c of config) {
      const field = c.field;
      const label = c.label || field;
      const fmt = (c.format || 'text').toLowerCase();
      const emptyHide = !!c.empty_hide;

      const raw = record ? record[field] : '';
      const rawStr = (raw === null || raw === undefined) ? '' : String(raw);

      if (emptyHide && rawStr.trim() === '') continue;

      let display = rawStr;

      if (fmt === 'date_jst') display = formatDateJST(raw);
      else if (fmt === 'number') display = formatNumber(raw);
      else if (fmt === 'currency') display = formatCurrencyJPY(raw);
      else if (fmt === 'link') display = rawStr;

      const k = document.createElement('div');
      k.className = 'k';
      k.textContent = label;

      const v = document.createElement('div');
      v.className = 'v';

      if (fmt === 'link' && rawStr.trim()) {
        const a = document.createElement('a');
        a.className = 'link';
        a.href = rawStr.trim();
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = '開く';
        v.appendChild(a);
      } else {
        v.textContent = display;
      }

      kv.appendChild(k);
      kv.appendChild(v);
    }
  }

  window.onload = () => {
    document.getElementById('formBtn').href = FORM_URL;

    google.accounts.id.initialize({
      client_id: CLIENT_ID,
      callback: async (resp) => {
        clearError();
        hideNoData();
        document.getElementById('status').textContent = '確認中...';
        document.getElementById('content').style.display = 'none';

        try {
          const data = await callApi(resp.credential);
          document.getElementById('status').textContent = '';

          if (!data || !data.ok) {
            if (data && data.code === 'NO_RECORD') {
              const msg =
                "登録したGmailと一致するアカウントが見つかりませんでした。\n" +
                "登録から3営業日以上経っても反映されない場合は、お手数ですが登録フォームから再度お申し込みください。";
              showNoData(msg);
              return;
            }
            showError((data && (data.message || JSON.stringify(data, null, 2))) || 'Login failed');
            return;
          }

          document.getElementById('content').style.display = 'block';

          // CONFIGに従って描画
          const cfg = Array.isArray(data.config) ? data.config : [];
          renderKV(cfg, data.record || {});

        } catch (e) {
          document.getElementById('status').textContent = '';
          showError(String(e));
        }
      }
    });

    google.accounts.id.renderButton(
      document.getElementById("gbtn"),
      { theme: "outline", size: "large", text: "signin_with" }
    );
  };
</script>
</body>
</html>
